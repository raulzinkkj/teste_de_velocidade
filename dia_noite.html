<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.4s;
        }

        #tema {
            display: none;

        }

        .toggle {
            width: 90px;
            height: 45px;
            border-radius: 50px;
            background: #DDD;
            position: relative;
            cursor: pointer;
            transition: 0.5s;
        }

        .toggle::before {
            content: "☀️";
            height: 35px;
            width: 35px;
            background: white;
            position: absolute;
            left: 5px;
            top: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            border-radius: 50%;
            transition: 0.5s;
        }

        #tema:checked + .toggle {
            background: #333;
        }

        #tema:checked + .toggle::before {
            content: "🌙";
            left: 50px;
            background: #dddddd76;
        }

        .bg {
            position: fixed;
            inset: 0;
            background: white;
            z-index: -1;
            transition: 0.5s;
        }

        #tema:checked ~ .bg {
            background: #121212;
        }

    </style>
</head>
<body>
     <input type="checkbox" id="tema">
     <label for="tema" class="toggle"></label>
    <div class="bg"></div>

</body>
</html>
